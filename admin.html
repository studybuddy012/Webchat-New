<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - User Login Logs</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; border-bottom: 2px solid #34b7f1; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #34b7f1; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .ip-badge { background: #e1f5fe; color: #01579b; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-family: monospace; }
        .device-badge { background: #eee; padding: 4px 8px; border-radius: 4px; font-size: 0.9em; }
        .time-txt { color: #666; font-size: 0.85em; }
    </style>
</head>
<body>

<div class="container">
    <h2>User Tracking Dashboard</h2>
    <table id="logsTable">
        <thead>
            <tr>
                <th>Username</th>
                <th>IP Address</th>
                <th>Device</th>
                <th>Type</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="log-data">
            </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Teri Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyD4Jys3IDFC208G69auTbgTe0LkeIcauGI",
        authDomain: "new-webchat.firebaseapp.com",
        projectId: "new-webchat",
        storageBucket: "new-webchat.firebasestorage.app",
        messagingSenderId: "815354080113",
        appId: "1:815354080113:web:f9b30bc1d1aee8655fe4d0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Logs fetch karne ka logic
    const logsRef = collection(db, "login_logs");
    const q = query(logsRef, orderBy("loginTime", "desc")); // Latest pehle dikhega

    onSnapshot(q, (snap) => {
        const tableBody = document.getElementById("log-data");
        tableBody.innerHTML = ""; 

        if (snap.empty) {
            tableBody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No logs found yet...</td></tr>";
            return;
        }

        snap.forEach((doc) => {
            const log = doc.data();
            const time = log.loginTime ? new Date(log.loginTime).toLocaleString() : "N/A";
            
            const row = `
                <tr>
                    <td><strong>${log.username}</strong></td>
                    <td><span class="ip-badge">${log.ip}</span></td>
                    <td><span class="device-badge">${log.device}</span></td>
                    <td>${log.type || "Login"}</td>
                    <td class="time-txt">${time}</td>
                </tr>
            `;
            tableBody.insertAdjacentHTML('beforeend', row);
        });
    });
</script>

</body>
</html>
