<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Login</title>
  <style>
    * { box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, #f5f7fa, #e4ebf5); display: flex; justify-content: center; align-items: center; }
    .login-box { width: 100%; max-width: 360px; background: #ffffff; padding: 28px 24px; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
    .login-box h2 { margin-bottom: 20px; font-size: 22px; font-weight: 600; }
    .login-box input { width: 100%; padding: 12px 14px; margin-bottom: 14px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; outline: none; }
    .login-box button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 999px; border: none; background: #3797f0; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Private Chat</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
