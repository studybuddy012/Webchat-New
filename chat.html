<body>

          <div class="emoji-grid" id="gestures">

      <div class="input-wrapper">
        <input type="file" id="drive-upload" style="display:none" accept="image/*,video/*,audio/*">
        <button id="attach-btn" class="action-btn">
          <i class="fa-solid fa-paperclip"></i>
        </button>

        <button id="emoji-btn" class="action-btn">
          <i class="fa-regular fa-face-smile"></i>
        </button>
        <div id="typing-indicator-wrapper">
    <div id="typing-indicator" class="hidden">
        <div class="typing-dots">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>
</div>
        <input type="text" id="msg" placeholder="Message..." autocomplete="off">
      <!-- <button id="mic-btn" class="icon-btn"><i class="fas fa-microphone"></i></button>   -->
        <button id="send-btn" class="action-btn">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>
    </div>
<div id="media-modal" class="modal hidden">
  <span class="close-modal">&times;</span>
  <div class="modal-content">
    </div>
</div>
    <script type="module" src="chat.js"></script>

    <script>
      // Existing Logic for Emoji Picker
      const emojiBtn = document.getElementById('emoji-btn');
      const emojiPicker = document.getElementById('emoji-picker');
      const msgInput = document.getElementById('msg');
      const tabBtns = document.querySelectorAll('.tab-btn');
      const emojiGrids = document.querySelectorAll('.emoji-grid');

      emojiBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        emojiPicker.classList.toggle('hidden');
      });

      tabBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const category = btn.getAttribute('data-cat');
          tabBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          emojiGrids.forEach(grid => {
            grid.classList.remove('active');
            if (grid.id === category) grid.classList.add('active');
          });
        });
      });

      emojiPicker.addEventListener('click', (e) => {
        if (e.target.tagName === 'SPAN') {
          msgInput.value += e.target.textContent;
          msgInput.focus();
        }
      });

      document.addEventListener('click', (e) => {
        if (!emojiPicker.contains(e.target) && e.target !== emojiBtn) {
            emojiPicker.classList.add('hidden');
        }
      });

      // Simple Click handler for Paperclip
      const attachBtn = document.getElementById('attach-btn');
      const driveUpload = document.getElementById('drive-upload');
      
      attachBtn.addEventListener('click', () => {
        // Drive logic will be handled in chat.js
        console.log("Attachment button clicked");
      });
    </script>
</body>
